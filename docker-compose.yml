services:
  postgres:
    image: postgres:17
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: postgres
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres']
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - db
    profiles:
      - default
      - noapp
    volumes:
      - postgres-data:/var/lib/postgresql/data

  app:
    build: .
    depends_on:
      postgres:
        condition: service_healthy
    env_file:
      - .env.docker
    healthcheck:
      test: ['CMD', 'wget', '--no-verbose', '--tries=1', '--spider', 'http://localhost:3000/health']
      interval: 30s
      timeout: 3s
      start_period: 10s
      retries: 3
    networks:
      - db
    profiles:
      - default
    ports:
      - "3000:3000"
    command: npm run start:prod

  test:
    build: .
    profiles:
      - test
    command: npm run test

  postgres-e2e:
    image: postgres:17
    restart: "no"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: postgres_e2e
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres']
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - db
    profiles:
      - e2e

  e2e:
    build: .
    depends_on:
      postgres-e2e:
        condition: service_healthy
    env_file:
      - .env.docker
    environment:
      NODE_ENV: test
      DB_HOST: postgres-e2e
      DB_NAME: postgres_e2e
      JWT_SECRET: e2e-test-secret
      REFRESH_TOKEN_SECRET: e2e-test-refresh-secret
      BREVO_API_KEY: e2e-test-key
      DEFAULT_SENDER_EMAIL: noreply@test.com
      DEFAULT_SENDER_NAME: E2E Test
      CONTACT_EMAIL: test@test.com
      TURNSTILE_SECRET_KEY: e2e-test-turnstile
      BCRYPT_SALT_ROUNDS: 4
      THROTTLE_LIMIT: 1000
      SENSITIVE_THROTTLE_LIMIT: 100
    networks:
      - db
    profiles:
      - e2e
    command: npm run test:e2e

volumes:
  postgres-data:
networks:
  db:
    driver: bridge